name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"   # matches tags like 1.9.51

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build zip
        run: |
          cd custom_components
          zip -r ../zambretti_sager.zip zambretti_sager/
          echo "Built zambretti_sager.zip"
          ls -lh ../zambretti_sager.zip

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: zambretti_sager.zip
          fail_on_unmatched_files: true
